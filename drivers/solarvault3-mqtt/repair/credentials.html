<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jackery Battery (MQTT)</title>
</head>
<body>
  <header id="hy-header">
    <h1 class="homey-title homey-text-align-center">
      <span id="hy-header-title" data-i18n="pair.credentials.title">Credentials</span>
      <span id="hy-header-badge" class="homey-title-badge"></span>
    </h1>
    <h2 id="hy-header-subtitle" class="homey-subtitle homey-text-align-center" data-i18n="pair.credentials.subtitle">Your device needs credentials to connect with Homey</h2>
  </header>
  <form id="credentials-form" class="homey-form">
    <fieldset class="homey-form-fieldset">
      <div class="homey-form-group">
        <label class="homey-form-label" for="cred-token" data-i18n="pair.token.label"></label>
        <input class="homey-form-input" type="password" id="cred-token" required autocomplete="off" placeholder="●●●●●●●●">
      </div>
      <div class="homey-form-group">
        <label class="homey-form-label" for="cred-serial" data-i18n="pair.credentials.serial"></label>
        <input class="homey-form-input" type="text" id="cred-serial" required autocomplete="off" placeholder="SN">
      </div>
    </fieldset>
  </form>
  <script type="application/javascript">
    (function () {
      Homey.setTitle('');
      Homey.setSubtitle('');

      var tokenInput = document.getElementById('cred-token');
      var serialInput = document.getElementById('cred-serial');

      function getFormData() {
        return {
          token: tokenInput.value.trim(),
          deviceSn: serialInput.value.trim()
        };
      }

      function persist() {
        return Homey.emit('save_repair_credentials', getFormData());
      }

      Homey.emit('get_credentials_form_defaults').then(function (defaults) {
        if (defaults) {
          tokenInput.value = defaults.token || '';
          serialInput.value = defaults.deviceSn || '';
        }
      }).catch(function () {});

      Homey.on('next', function (callback) {
        if (!tokenInput.value.trim()) {
          Homey.alert(Homey.__('pair.token.required'), 'warning');
          callback(false);
          return;
        }
        if (!serialInput.value.trim()) {
          Homey.alert(Homey.__('pair.credentials.serial_required'), 'warning');
          callback(false);
          return;
        }
        persist()
          .then(function () {
            Homey.done();
            callback(true);
          })
          .catch(function (err) {
            Homey.alert(err.message || String(err), 'error');
            callback(false);
          });
      });
    })();
  </script>
</body>
</html>
